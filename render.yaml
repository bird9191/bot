services:
  - type: worker
    name: clean-clinic-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ADMIN_CHAT_IDS
        sync: false
      - key: WA_LINK
        sync: false
      - key: GOOGLE_SHEET_ID
        value: 1M66V9ptnrbtgU0-lDxwkp-91eTOTe3RHp77QMO9M7LI
      - key: GOOGLE_SHEET_NAME
        value: Лиды
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
